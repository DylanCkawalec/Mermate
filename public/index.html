<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermate</title>
  <link rel="icon" type="image/png" href="/mermate-icon.png">
  <link rel="apple-touch-icon" href="/mermate-icon.png">
  <meta property="og:image" content="/mermate-icon.png">
  <meta name="twitter:image" content="/mermate-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/mermaid-gpt.css">
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" role="navigation" aria-label="Diagram history">
    <div class="sidebar-header">
      <img src="/mermate-logo.svg" alt="Mermate" class="sidebar-logo" />
    </div>
    <div class="sidebar-modes" role="radiogroup" aria-label="Input mode">
      <button class="sidebar-mode-btn active" data-mode="idea" role="radio" aria-checked="true">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5a4.5 4.5 0 0 1 2.25 8.4v1.85a1.25 1.25 0 0 1-1.25 1.25h-2a1.25 1.25 0 0 1-1.25-1.25V9.9A4.5 4.5 0 0 1 8 1.5z"/><line x1="6.5" y1="14" x2="9.5" y2="14"/></svg>
        <span>Simple Idea</span>
      </button>
      <button class="sidebar-mode-btn" data-mode="md" role="radio" aria-checked="false">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1.5" width="12" height="13" rx="1.5"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
        <span>Markdown Spec</span>
      </button>
      <button class="sidebar-mode-btn" data-mode="mmd" role="radio" aria-checked="false">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="5 4 2 8 5 12"/><polyline points="11 4 14 8 11 12"/><line x1="9" y1="2" x2="7" y2="14"/></svg>
        <span>Mermaid</span>
      </button>
    </div>
    <input type="checkbox" id="chk-enhance" hidden />
    <nav id="sidebar-list" class="sidebar-list" aria-label="Previous diagrams"></nav>
  </aside>

  <!-- Main content -->
  <main class="main" role="main">
    <!-- New diagram CTA -->
    <button id="btn-new-diagram" class="btn-new-float" aria-label="New diagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>New Diagram</span>
    </button>
    <!-- Input area -->
    <section id="input-section" class="input-section">
      <!-- File upload (hidden input) -->
      <input type="file" id="file-upload" hidden />

      <div class="name-strip">
        <input type="text" id="diagram-name-input" class="diagram-name-input" placeholder="Name this diagram (optional)" spellcheck="false" autocomplete="off" />
      </div>

      <div class="copilot-wrap">
        <textarea
          id="mermaid-input"
          class="input-textarea"
          placeholder="Describe your system, workflow, or diagram idea...

Start simply:
  &quot;A user logs in, the server checks credentials, then redirects to dashboard&quot;

Or more structured:
  &quot;Payment flow: Browser → API Gateway → Payment Service → Stripe → Bank
   - on success: return confirmation to browser
   - on failure: show error, retry up to 3 times → dead letter queue&quot;

Useful signals: actors, services, arrows (→), steps, decisions, states, failures

Type /talk to speak your idea"
          spellcheck="false"
          aria-describedby="input-hint"
        ></textarea>
        <!-- Talk-to-text mic button -->
        <button id="btn-mic" class="btn-mic" aria-label="Speak your mind — speech-to-text" title="Speak your mind">
          <svg class="mic-icon mic-icon-idle" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5a2 2 0 0 0-2 2v4a2 2 0 0 0 4 0v-4a2 2 0 0 0-2-2z"/><path d="M4 7a4 4 0 0 0 8 0"/><line x1="8" y1="13" x2="8" y2="11"/><line x1="6" y1="13" x2="10" y2="13"/></svg>
          <svg class="mic-icon mic-icon-rec" viewBox="0 0 16 16" fill="currentColor" stroke="none" hidden><circle cx="8" cy="8" r="5"/></svg>
          <span class="mic-label">Speak your mind</span>
        </button>
        <div class="copilot-ghost-layer" aria-hidden="true" style="display:none">
          <span class="copilot-mirror-text"></span><span class="copilot-ghost-text"></span>
        </div>
        <span id="copilot-thinking" class="copilot-thinking" hidden aria-hidden="true">
          <span class="copilot-dot"></span>
          <span class="copilot-dot"></span>
          <span class="copilot-dot"></span>
        </span>
      </div>

      <div class="input-controls">
        <button id="btn-upload" class="btn-upload" aria-label="Upload file">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V3m0 0L5.5 5.5M8 3l2.5 2.5"/><path d="M2.5 10.5v2a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-2"/></svg>
          Upload
        </button>
        <button id="btn-enhance" class="btn-upload" aria-label="Enhance with AI" title="AI refine — enhance your input before rendering">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1l1.5 4.5L14 7l-4.5 1.5L8 13l-1.5-4.5L2 7l4.5-1.5z"/></svg>
          Enhance
        </button>
        <span id="input-hint" class="input-hint">Type an idea and the system will generate a diagram</span>
        <span id="content-state-badge" class="state-badge" aria-live="polite"></span>
        <span id="diagram-type-badge" class="type-badge" aria-live="polite"></span>

        <!-- Agent mode selector -->
        <div class="agent-selector-wrap">
          <button id="btn-agent-toggle" class="btn-agent-toggle" aria-label="Select Agent mode" title="Agent: automated architecture refinement">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v4l2.5 2.5"/></svg>
            Agent
          </button>
          <div id="agent-dropdown" class="agent-dropdown" hidden>
            <button class="agent-mode-option" data-agent-mode="thinking">
              <span class="agent-mode-icon">💡</span>
              <span class="agent-mode-info">
                <span class="agent-mode-name">Thinking</span>
                <span class="agent-mode-desc">Build architecture from ideas or notes</span>
              </span>
            </button>
            <button class="agent-mode-option" data-agent-mode="code-review">
              <span class="agent-mode-icon">🔍</span>
              <span class="agent-mode-info">
                <span class="agent-mode-name">Code Review</span>
                <span class="agent-mode-desc">Recover architecture from a codebase</span>
              </span>
            </button>
            <button class="agent-mode-option" data-agent-mode="optimize-mmd">
              <span class="agent-mode-icon">⚡</span>
              <span class="agent-mode-info">
                <span class="agent-mode-name">Optimize</span>
                <span class="agent-mode-desc">Improve existing Mermaid or markdown</span>
              </span>
            </button>
          </div>
        </div>

        <button id="btn-max" class="btn-max" aria-label="Toggle Max mode for strongest architecture output" title="Max: use strongest premium model for architect-grade output">Max</button>
        <button id="btn-render" class="btn btn-render" aria-label="Render diagram">
          Render
          <span class="kbd">&#8984;&#9166;</span>
        </button>
        <button id="btn-agent-run" class="btn btn-agent-run" hidden aria-label="Run Agent">
          Run Agent
        </button>
      </div>

      <!-- Agent planning panel -->
      <div id="agent-panel" class="agent-panel" hidden>
        <div class="agent-panel-header">
          <span class="agent-panel-title">Agent</span>
          <span id="agent-panel-mode" class="agent-panel-mode"></span>
          <button id="btn-agent-stop" class="agent-panel-stop" aria-label="Stop agent" title="Stop">&times;</button>
        </div>
        <div id="agent-panel-log" class="agent-panel-log"></div>
        <!-- Pre-Max notes input -->
        <div id="agent-notes-wrap" class="agent-notes-wrap" hidden>
          <textarea
            id="agent-notes-input"
            class="agent-notes-input"
            rows="2"
            placeholder="Add notes before Max render… e.g. 'Focus on failure paths' or 'Make frontend/backend split clearer'"
          ></textarea>
          <button id="btn-agent-commit" class="btn btn-agent-finalize">
            Render as is
          </button>
        </div>
      </div>
    </section>

    <!-- Error banner -->
    <div id="error-banner" class="error-banner" role="alert" hidden>
      <span id="error-message"></span>
      <button id="btn-dismiss-error" class="btn-dismiss" aria-label="Dismiss error">&times;</button>
    </div>

    <!-- Result area -->
    <section id="result-section" class="result-section" hidden>
      <div id="flip-card-container" class="flip-card-container">
        <div id="flip-card" class="flip-card" role="button" tabindex="0" aria-label="Click to flip between PNG and SVG views">
          <div class="flip-card-inner" id="flip-card-inner">
            <!-- Front: PNG -->
            <div class="flip-card-face flip-card-front">
              <span class="card-badge">PNG</span>
              <button class="btn-expand" data-action="expand" aria-label="Expand to fullscreen" title="Expand">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="10 2 14 2 14 6"/><polyline points="6 14 2 14 2 10"/><line x1="14" y1="2" x2="9.5" y2="6.5"/><line x1="2" y1="14" x2="6.5" y2="9.5"/></svg>
              </button>
              <div id="pan-zoom-front" class="pan-zoom-viewport">
                <img id="result-png" class="result-image" alt="Rendered diagram (PNG)" />
              </div>
            </div>
            <!-- Back: SVG -->
            <div class="flip-card-face flip-card-back">
              <span class="card-badge">SVG</span>
              <button class="btn-expand" data-action="expand" aria-label="Expand to fullscreen" title="Expand">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="10 2 14 2 14 6"/><polyline points="6 14 2 14 2 10"/><line x1="14" y1="2" x2="9.5" y2="6.5"/><line x1="2" y1="14" x2="6.5" y2="9.5"/></svg>
              </button>
              <div id="pan-zoom-back" class="pan-zoom-viewport">
                <img id="result-svg" class="result-svg-img" alt="Rendered diagram (SVG)" />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="result-controls">
        <button id="btn-flip" class="btn btn-secondary" aria-label="Flip card">Flip View</button>
        <button id="btn-reset-zoom" class="btn btn-secondary" aria-label="Reset zoom">Reset Zoom</button>
        <button id="btn-download" class="btn btn-secondary" aria-label="Download PNG + SVG as ZIP">Download</button>
      </div>
    </section>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay" hidden aria-live="polite">
      <div class="loading-content">
        <div id="loading-visual" class="loading-visual" aria-hidden="true"></div>
        <p id="loading-text" class="loading-text">Compiling diagram...</p>
      </div>
    </div>
  </main>

  <!-- Delete confirmation dialog -->
  <dialog id="delete-dialog" class="delete-dialog">
    <p class="delete-dialog-text">Delete <strong id="delete-diagram-name"></strong>?</p>
    <p class="delete-dialog-sub">This removes the diagram and its compiled outputs.</p>
    <div class="delete-dialog-actions">
      <button id="btn-delete-cancel" class="btn btn-secondary">Cancel</button>
      <button id="btn-delete-confirm" class="btn btn-danger">Yes, delete</button>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <script src="/js/mermaid-gpt-classifier.js"></script>
  <script src="/js/mermaid-gpt-pan-zoom.js"></script>
  <script src="/js/mermaid-gpt-flip-card.js"></script>
  <script src="/js/mermaid-gpt-sidebar.js"></script>
  <script src="/js/mermaid-gpt-copilot.js"></script>
  <script src="/js/mermaid-gpt-agent.js"></script>
  <script src="/js/mermaid-gpt-speech.js"></script>
  <script src="/js/mermaid-gpt-app.js"></script>
</body>
</html>
